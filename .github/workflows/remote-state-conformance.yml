# remote-state-conformance.yml
#
# Smoke-tests the remote-state client integration against a real orun-backend.
# Gated behind a repository variable so it only runs when REMOTE_STATE_TESTS=true
# (set in repo Settings → Variables → Actions).
#
# Required secrets / variables:
#   ORUN_BACKEND_URL  (variable)  - URL of the test orun-backend
#   ORUN_TOKEN        (secret)    - API token for the test backend

name: remote-state-conformance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'internal/remotestate/**'
      - 'internal/statebackend/**'
      - 'cmd/orun/command_run.go'

jobs:
  conformance:
    name: Remote state conformance
    if: vars.REMOTE_STATE_TESTS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build orun
        run: go build -o /usr/local/bin/orun ./cmd/orun

      - name: Plan
        id: plan
        env:
          ORUN_BACKEND_URL: ${{ vars.ORUN_BACKEND_URL }}
          ORUN_TOKEN: ${{ secrets.ORUN_TOKEN }}
        run: |
          orun plan \
            --intent examples/remote-state-matrix/intent.yaml \
            --output plan.json \
            --format json
          echo "plan-id=$(cat plan.json | jq -r '.metadata.checksum')" >> "$GITHUB_OUTPUT"

      - name: Run (all jobs, single worker)
        env:
          ORUN_BACKEND_URL: ${{ vars.ORUN_BACKEND_URL }}
          ORUN_TOKEN: ${{ secrets.ORUN_TOKEN }}
          ORUN_PLAN_ID: ${{ steps.plan.outputs.plan-id }}
        run: |
          orun run \
            --remote-state \
            --backend-url "$ORUN_BACKEND_URL" \
            --plan plan.json \
            --dry-run

      - name: Check status
        env:
          ORUN_BACKEND_URL: ${{ vars.ORUN_BACKEND_URL }}
          ORUN_TOKEN: ${{ secrets.ORUN_TOKEN }}
          ORUN_EXEC_ID: ${{ env.ORUN_EXEC_ID }}
        run: |
          orun status \
            --remote-state \
            --backend-url "$ORUN_BACKEND_URL" \
            --exec-id "$ORUN_EXEC_ID" \
            --json
